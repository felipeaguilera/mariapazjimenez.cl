backend:
  name: git-gateway
  branch: main

media_folder: public/assets
public_folder: /assets

locale: es

collections:
  - name: "home"
    label: "Página de inicio"
    files:
      - label: "Contenido del inicio"
        name: "home"
        file: "src/data/home.json"
        fields:
          - label: "Texto Quién soy"
            name: "about_text"
            widget: "text"
            hint: "3–5 líneas. Aparece en la sección 'Quién soy' justo después del hero. Puedes escribirlo en primera o tercera persona."

          - label: "Introducción (hero)"
            name: "hero_intro"
            widget: "text"
            hint: "Tu presentación breve. 2–3 líneas, primera persona."

          - label: "Cita destacada"
            name: "pull_quote"
            widget: "text"
            hint: "Una frase tuya. 1–2 líneas."

          - label: "Título de la sección Trabaja conmigo"
            name: "work_title"
            widget: "string"
            hint: "Ej: Trabaja con María Paz Jiménez"

          - label: "Áreas de trabajo"
            name: "work_cards"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - label: "Descripción"
                name: "desc"
                widget: "text"
                hint: "2–3 líneas describiendo este área."
              - label: "Fotos del área"
                name: "images"
                widget: "list"
                hint: "Sube entre 3 y 5 fotos. Se muestran como slideshow automático. Recomendado: 1200x800 px, formato JPG/WebP."
                field:
                  label: "Foto"
                  name: "image"
                  widget: "image"

          - label: "Descripción del podcast"
            name: "podcast_desc"
            widget: "text"
            hint: "2–3 líneas sobre el podcast Vinos con Marypepa."

          - label: "Texto de contacto"
            name: "contact_desc"
            widget: "text"
            hint: "1–2 líneas de invitación a contactar."

  - name: "trayectoria"
    label: "Trayectoria"
    files:
      - label: "Contenido de trayectoria"
        name: "trayectoria"
        file: "src/data/trayectoria.json"
        fields:
          - label: "Subtítulo de la página"
            name: "subtitle"
            widget: "string"
            hint: "Una línea que resume tu carrera."

          - label: "Bloques de carrera"
            name: "career"
            widget: "list"
            summary: "{{fields.period}} — {{fields.title}}"
            fields:
              - { label: "Período", name: "period", widget: "string", hint: "Ej: 1999 · 2001" }
              - { label: "Empresa / Proyecto", name: "title", widget: "string" }
              - label: "Descripción corta"
                name: "desc"
                widget: "text"
                hint: "2–3 líneas de resumen. Siempre visible."
              - label: "Texto extendido (opcional)"
                name: "extended_text"
                widget: "text"
                required: false
                hint: "Si tienes un texto más largo (artículo, crónica), pégalo aquí. Aparece con botón 'Leer más'."
              - label: "Fotos"
                name: "images"
                widget: "list"
                hint: "Sube entre 2 y 4 fotos de esta etapa. Se muestran como slideshow automático. Recomendado: 1200x800 px."
                field:
                  label: "Foto"
                  name: "image"
                  widget: "image"
